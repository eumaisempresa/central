<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU⁺ Central | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dourado: #C4974A;
      --dourado-hover: #A67C3B;
      --fundo: #0D0D0D;
      --fundo-card: #1A1A1A;
      --texto: #F5F5F5;
      --texto-secundario: #A0A0A0;
      --borda: #2A2A2A;
      --erro: #E74C3C;
      --sucesso: #27AE60;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-area h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--dourado);
      letter-spacing: 1px;
    }

    .logo-area p {
      font-size: 0.85rem;
      color: var(--texto-secundario);
      margin-top: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card {
      background: var(--fundo-card);
      border: 1px solid var(--borda);
      border-radius: 12px;
      padding: 40px 32px;
    }

    .card h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 24px;
      color: var(--texto);
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      font-size: 0.8rem;
      color: var(--texto-secundario);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .campo input {
      width: 100%;
      padding: 12px 16px;
      background: var(--fundo);
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--texto);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.3s;
    }

    .campo input:focus {
      outline: none;
      border-color: var(--dourado);
    }

    .btn-principal {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px solid var(--dourado);
      border-radius: 8px;
      color: var(--dourado);
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-principal:hover {
      background: var(--dourado);
      color: var(--fundo);
    }

    .btn-principal:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .divisor {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--texto-secundario);
      font-size: 0.75rem;
    }

    .divisor::before,
    .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--borda);
    }

    .divisor span {
      padding: 0 12px;
    }

    .btn-secundario {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--borda);
      border-radius: 8px;
      color: var(--texto-secundario);
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secundario:hover {
      border-color: var(--dourado);
      color: var(--dourado);
    }

    .mensagem {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .mensagem.erro {
      display: block;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid var(--erro);
      color: var(--erro);
    }

    .mensagem.sucesso {
      display: block;
      background: rgba(39, 174, 96, 0.1);
      border: 1px solid var(--sucesso);
      color: var(--sucesso);
    }

    .rodape {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--texto-secundario);
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }
      .logo-area h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-area">
      <h1>EU⁺</h1>
      <p>Central do Gestor</p>
    </div>

    <div class="card">
      <h2>Acesse sua conta</h2>

      <!-- FORMULÁRIO DE LOGIN COM SENHA -->
      <div id="form-senha">
        <div class="campo">
          <label>Email</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="campo">
          <label>Senha</label>
          <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-principal" id="btn-login" onclick="fazerLogin()">Entrar</button>
      </div>

      <div class="divisor"><span>ou</span></div>

      <!-- MAGIC LINK -->
      <button class="btn-secundario" id="btn-magic" onclick="enviarMagicLink()">Entrar com link por email</button>

      <div id="msg" class="mensagem"></div>
    </div>

    <div class="rodape">
      EU⁺ Empresa &copy; 2025 — Todos os direitos reservados
    </div>
  </div>

  <!-- SUPABASE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- CONFIGURAÇÃO LOCAL -->
  <script src="supabase.js"></script>

  <script>
    // Verifica se já está logado
    (async () => {
      const sessao = await getSessao();
      if (sessao) {
        await redirecionarPorPapel();
      }
    })();

    // Login com email + senha
    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn-login');

      if (!email || !senha) {
        msg.className = 'mensagem erro';
        msg.textContent = 'Preencha email e senha.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      const { data, error } = await loginComSenha(email, senha);

      if (error) {
        msg.className = 'mensagem erro';
        msg.textContent = 'Email ou senha incorretos.';
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }

      msg.className = 'mensagem sucesso';
      msg.textContent = 'Login realizado! Redirecionando...';
      await redirecionarPorPapel();
    }

    // Magic link
    async function enviarMagicLink() {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn-magic');

      if (!email) {
        msg.className = 'mensagem erro';
        msg.textContent = 'Digite seu email primeiro.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const { data, error } = await loginComMagicLink(email);

      if (error) {
        msg.className = 'mensagem erro';
        msg.textContent = 'Erro ao enviar link. Tente novamente.';
        btn.disabled = false;
        btn.textContent = 'Entrar com link por email';
        return;
      }

      msg.className = 'mensagem sucesso';
      msg.textContent = 'Link enviado! Verifique seu email e clique no link para entrar.';
      btn.disabled = false;
      btn.textContent = 'Entrar com link por email';
    }

    // Enter para submeter
    document.getElementById('senha').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') fazerLogin();
    });
    document.getElementById('email').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('senha').focus();
    });
  </script>

</body>
</html>
